# ===================================
# SQL Server Configuration
# ===================================
spring.datasource.url=jdbc:sqlserver://192.168.1.63:1433;databaseName=AuthDB;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=password
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ===================================
# JPA/Hibernate Configuration
# ===================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# ===================================
# Server Configuration
# ===================================
server.port=8080
spring.application.name=auth-system

# ===================================
# JWT Configuration
# ===================================
jwt.secret=your-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
jwt.expiration=604800000

# ===================================
# Logging
# ===================================
logging.level.com.example.authsystem=DEBUG
logging.level.org.springframework.security=DEBUG

# Allow all origins (chỉ dùng khi dev)
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*